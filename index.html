  function parseTime(str){
    if(!str) return null;
    const s = String(str).trim().toUpperCase();
    const m = s.match(/^(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?$/);
    if(!m) return null;
    let hr = parseInt(m[1]); const min = m[2] ? parseInt(m[2]) : 0; const ampm = m[3];
    if(hr > 23 || min > 59) return null;
    if(ampm === 'PM' && hr < 12) hr += 12;
    if(ampm === 'AM' && hr === 12) hr = 0;
    // ambient assumption: bare hours 1-7 default to PM (typical wedding evening)
    // 8-12 stay as typed; users can always add AM/PM to override
    if(!ampm && hr >= 1 && hr <= 7) hr += 12;

  function getReminderStatus(r){

      }
      return { kind: 'ok', label: 'Recurring on schedule', detail: 'Sends based on the cadence rule.' };
    }
    if(r.daysOut == null || r.daysOut < 0){
      return { kind: 'invalid', label: 'No trigger set', detail: 'Set the days field to schedule this reminder.' };
    }
    if(r.anchor === 'beforeWedding'){
      const dayLabel = r.daysOut === 0 ? 'On the wedding day' : 'Sends '+r.daysOut+' day'+(r.daysOut===1?'':'s')+' before the wedding';
      return { kind: 'ok', label: dayLabel, detail: 'Anchored to each couple\'s wedding date.' };
    }
    // afterSetup
    const dayLabel = r.daysOut === 0 ? 'Sends on signup day' : 'Sends '+r.daysOut+' day'+(r.daysOut===1?'':'s')+' after couple signs up';
    return { kind: 'ok', label: dayLabel, detail: 'Anchored to each couple\'s account creation date.' };

      const wed = new Date(ev.weddingDateISO);
      if(isNaN(wed.getTime())) return;
      wed.setHours(0,0,0,0);
      if(ev.status === 'active' && wed < now){
        ev.status = 'past';
        ev.becamePastAt = now.toISOString();
      }
    });
  }
  function daysSinceWedding(ev){
    const wed = new Date(ev.weddingDateISO);
    if(isNaN(wed.getTime())) return 0;
    const now = new Date(); now.setHours(0,0,0,0); wed.setHours(0,0,0,0);
    return Math.max(0, Math.round((now - wed) / (1000*60*60*24)));
  }

  // ---- Progress Math (single source of truth, used by both views) ----
  function generalProgress(){
    const fields = ['partnerAFull','partnerBFull','weddingDate','guestCount','venueName','venueAddress','ceremonyTime','endTime','dayOfContact'];
    const filled = fields.filter(k => (state.general[k]||'').trim()).length;
    const fpScore = state.floorPlan.uploaded ? 1 : 0;
    return { filled: filled + fpScore, total: fields.length + 1 };
  }
  function partyProgress(){
    let filled = 0, total = 0;
    state.party.forEach(p=>{
      const hasRole = (p.role||'').trim();
      if(!hasRole && !p.name) return; // empty slots don't count
      total += 3; // role, name, phonetic
      if((p.role||'').trim()) filled += 1;
      if((p.name||'').trim()) filled += 1;
      if((p.phonetic||'').trim()) filled += 1;
    });
    if(total === 0) return { filled: 0, total: 1 };
    return { filled, total };
  }
  function musicProgress(){
    let filled = 0, total = 0;
    [...getKeyMoments(), ...state.customMoments.map(m=>({ key: m.key }))].forEach(m=>{
      const d = state.keyMoments[m.key]; if(!d) return;
      if(d.skip){ filled += 2; total += 2; return; } // skipped counts as resolved
      total += 2;
      if((d.song||'').trim()) filled += 1;
      if((d.artist||'').trim()) filled += 1;
    });
    // music meta
    total += 8;
    if(state.music.cleanPref) filled += 1;
    if((state.music.mustPlay||'').trim()) filled += 1;
    if((state.music.doNotPlay||'').trim()) filled += 1;
    if(Object.keys(state.music.genres).length > 0) filled += 1;
    if(((state.music.seatingMusic||{}).text||'').trim()) filled += 1;
    if(((state.music.cocktailMusic||{}).text||'').trim()) filled += 1;
    if(((state.music.dinnerMusic||{}).text||'').trim()) filled += 1;
    if(((state.music.danceMusic||{}).text||'').trim()) filled += 1;
    return { filled, total };
  }
  function timelineProgress(){
    let filled = 0, total = 0;
    state.timeline.forEach(b=>{
      total += 2; // title + time
      if((b.title||'').trim()) filled += 1;
      if(b.mins != null) filled += 1;
    });
    return total === 0 ? { filled: 0, total: 1 } : { filled, total };
  }
  function socialProgress(){
    let filled = 0; const total = getVendorTypes().length;
    getVendorTypes().forEach(v=>{ const d = state.vendors[v.key]; if(d && ((d.business||'').trim() || (d.handle||'').trim())) filled += 1; });
    return { filled, total };
  }
  function sectionPct(key){
    let p;
    if(key === 'general') p = generalProgress();
    else if(key === 'party') p = partyProgress();
    else if(key === 'music') p = musicProgress();
    else if(key === 'timeline') p = timelineProgress();
    else if(key === 'social') p = socialProgress();
    else p = { filled: 0, total: 1 };
    if(state.sections[key].userComplete) return 100;
    if(p.total === 0) return 0;
    const raw = (p.filled / p.total) * 100;
    // cap at 99 until user marks complete
    return Math.min(99, Math.round(raw));
  }
  function overallPct(){
    const keys = Object.keys(state.sections);
    const total = keys.reduce((sum, k)=> sum + sectionPct(k), 0);
    return Math.round(total / keys.length);
  }

  let toastTimer = null;
  function showToast(msg, undoFn){
    state.toast = { msg, undoFn };
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>{ state.toast = null; render(); }, 6000);
    render();
  }

  function getAllMoments(){
    return getKeyMoments().concat(state.customMoments.map(m => ({ key: m.key, label: m.label, timelineKey: m.timelineKey, extras: [], custom: true })));
  }
  function momentsForTimeline(id){
    return getAllMoments().filter(m => m.timelineKey === id).map(m => ({ ...m, data: state.keyMoments[m.key] || {} }));
  }
  function songSummaryForBlock(b){
    const m = momentsForTimeline(b.id); if(!m.length) return null;
    const a = m.filter(x => !x.data.skip && (x.data.song || x.data.artist));
    if(!a.length) return null;
    return { items: a.map(x => ({ key: x.key, label: x.label, text: x.data.artist ? x.data.song+' \u00b7 '+x.data.artist : x.data.song, notes: x.data.notes || '' })) };
  }
  // Map timeline block ids to the music section playlist key (labels adapt to type)
  function timelinePlaylistMap(){
    return {
      guestArrival: { key: 'seatingMusic', label: cfg().arrivalPlaylistLabel },
      cocktail: { key: 'cocktailMusic', label: cfg().receptionPlaylistLabel },
      dinner: { key: 'dinnerMusic', label: 'Dinner playlist' },
      openFloor: { key: 'danceMusic', label: 'Dance floor playlist' },
    };
  }
  function sortTimeline(){ state.timeline.sort((a,b)=>(a.mins??99999)-(b.mins??99999)); }

  // Fires when a couple's planner hits 100% (every section userComplete=true).
  // Sends the configured event-trigger notifications to DJ + admin (once per event).
  function checkPlannerCompleteTrigger(){
    const isComplete = Object.values(state.sections).every(s => s.userComplete);
    if(!isComplete) return;
    const trigger = state.eventTriggers.find(t => t.id === 't_planner_complete');
    if(!trigger || !trigger.enabled) return;
    const eventId = state.activeDjEventId;
    if(!eventId) return;
    if(state.triggerHistory[eventId+':planner_complete']) return; // already fired
    state.triggerHistory[eventId+':planner_complete'] = new Date().toISOString();
    const ev = state.eventAssignments.find(e => e.id === eventId);
    const coupleName = ev ? ev.couple : 'A couple';
    const recipients = [];
    if(trigger.recipients.dj) recipients.push(ev ? ev.dj : 'DJ');
    if(trigger.recipients.admin) recipients.push('Admin');
    const channels = Object.keys(trigger.channels).filter(k => trigger.channels[k]);
    if(!recipients.length || !channels.length) return;
    showToast('Notified '+recipients.join(' + ')+' via '+channels.join(', ')+': '+coupleName+' finished their planner');
  }

  function checkNudgeFor99(key){
    if(state.role !== 'couple') return; // staff/admin shouldn't see the couple's nudge
    const pct = sectionPct(key);
    if(pct === 99 && !state.nudgedFor99[key] && !state.sections[key].userComplete){
      state.nudgedFor99[key] = true;
      state.popup = {
        title: 'Looks like you\'re finished!',
        body: 'You filled out everything we know to ask. If you\'re done with this section, hit Mark Complete to lock it in. Or keep going if there\'s more to add.',
        actions: [
          { label: 'Keep editing', kind: 'ghost', fn: ()=>{} },
          { label: 'Mark complete', kind: 'mint', fn: ()=>{ state.sections[key].userComplete = true; checkPlannerCompleteTrigger(); } },
        ]
      };
    }
  }

  function loadState(){
    try {
      if(typeof localStorage === 'undefined') return;
      const raw = localStorage.getItem(storageKey());
      if(!raw){
        if(SEEDED_EVENT_IDS.indexOf(state.activeDjEventId) === -1) blankPlanner();
        return;
      }
      const snap = JSON.parse(raw);
      PERSIST_KEYS.forEach(k => { if(snap[k] !== undefined) state[k] = snap[k]; });
    } catch(e){ /* ignore a corrupt save */ }
  }
  let _saveTimer = null;

  function buildSubmission(){
    const ev = currentEvent() || {};

      const d = state.keyMoments[m.key] || {};
      return { moment: m.label, song: d.song||'', artist: d.artist||'', skip: !!d.skip, notes: d.notes||'' };
    });
    return {
      submittedAt: new Date().toISOString(), orgId: CURRENT_ORG_ID, eventId: state.activeDjEventId,
      eventType: currentEventType(), client: clientDisplayName(), accessCode: ev.accessToken || '',

      general: state.general, vips: state.party, moments: moments,
      timeline: state.timeline.map(b=>({ time: formatTime(b.mins), title: b.title, note: b.sub||'' })),
      music: {

  function submitToDj(){

    if(!SHEET_WEBHOOK_URL){ showToast('Saved on this device. (DJ copy not connected yet.)'); return; }
    try {

  function render(){

    const _et = currentEventType();
    state.timeline = state.timelines[_et];
    state.timelineBank = state.timelineBanks[_et];
    if(state._lastEventType !== _et){ state.timelineErrors = {}; state._lastEventType = _et; }
    // Clear any orphaned popups from previous render to prevent stacking
    document.querySelectorAll('.bwp-popup-bg').forEach(n => n.remove());
    document.querySelectorAll('.bwp-welcome-overlay').forEach(n => n.remove());

    if(state.role === 'couple'){
      if(!state.coupleAuthed){ renderCoupleSignIn(); return; }

      if(!state.staffAuthed){ renderStaffSignIn(); return; }
      if(state.view === 'dashboard') renderStaffEvents();

  // Soft chime via Web Audio. Single bell-like note, ~0.9s decay. Plays once on first-time welcome.
  function playWelcomeChime(){
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if(!Ctx) return;
      const ctx = new Ctx();
      // Two stacked sine notes (a fifth apart) for a soft pleasant bell tone
      const playNote = (freq, startOffset, duration, peakGain) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        const t0 = ctx.currentTime + startOffset;
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.start(t0);
        osc.stop(t0 + duration + 0.05);
      };
      // C5 + G5, light + soft, like an Apple Pay confirmation
      playNote(523.25, 0, 0.9, 0.18);
      playNote(783.99, 0.05, 0.85, 0.10);
    } catch(e){ /* silent fail */ }
  }

  function wireTimeline(){
    const list = document.getElementById('bwp-tl-list'); let draggedIdx = null;
    if(list){
      list.querySelectorAll('.bwp-tl-item').forEach(item=>{
        item.addEventListener('dragstart', (e)=>{ draggedIdx = parseInt(item.dataset.idx); item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
        item.addEventListener('dragend', ()=>{ item.classList.remove('dragging'); list.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); });
        item.addEventListener('dragover', (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; item.classList.add('drag-over'); });
        item.addEventListener('dragleave', ()=>{ item.classList.remove('drag-over'); });
        item.addEventListener('drop', (e)=>{
          e.preventDefault();
          const t = parseInt(item.dataset.idx);
          if(draggedIdx===null||draggedIdx===t) return;
          // Per user spec: swap the TIMES (not the items). Drop a 5:30 on a 6:00, the 5:30 row keeps its title but takes 6:00.
          const a = state.timeline[draggedIdx]; const b = state.timeline[t];
          const tmp = a.mins; a.mins = b.mins; b.mins = tmp;
          state.timelineErrors = {};
          sortTimeline(); render();
        });
      });
    }
    document.querySelectorAll('[data-tl-time]').forEach(input=>{
      input.addEventListener('change', ()=>{
        const idx = parseInt(input.dataset.tlTime);
        const newMins = parseTime(input.value);
        if(newMins == null) { state.timelineErrors[idx] = 'Invalid time'; render(); return; }
        const start = state.wedding.eventStart, end = state.wedding.eventEnd;
        if(state.role === 'couple' && (newMins < start || newMins > end)){
          state.timelineErrors[idx] = 'Outside event window ('+formatTime(start)+' to '+formatTime(end)+')';
          render(); return;
        }
        delete state.timelineErrors[idx];
        state.timeline[idx].mins = newMins;
        sortTimeline(); render();
      });
    });
    document.querySelectorAll('[data-tl-title]').forEach(input=>{ input.addEventListener('input', ()=>{ state.timeline[parseInt(input.dataset.tlTitle)].title = input.value; checkNudgeFor99('timeline'); render(); }); });
    document.querySelectorAll('[data-tl-sub]').forEach(input=>{ input.addEventListener('input', ()=>{ state.timeline[parseInt(input.dataset.tlSub)].sub = input.value; }); });
    document.querySelectorAll('[data-tl-remove]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{ e.stopPropagation(); const idx = parseInt(btn.dataset.tlRemove); const removed = state.timeline.splice(idx, 1)[0]; state.timelineBank.unshift(removed); showToast('Removed '+removed.title, ()=>{ state.timelineBank.shift(); state.timeline.splice(idx, 0, removed); sortTimeline(); }); });
    });
    document.querySelectorAll('[data-tl-restore]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ const idx = parseInt(btn.dataset.tlRestore); const r = state.timelineBank.splice(idx, 1)[0]; state.timeline.push(r); sortTimeline(); render(); });
    });
    const add = document.getElementById('bwp-tl-add');
    if(add) add.addEventListener('click', ()=>{
      let lastMins = state.timeline.length ? state.timeline[state.timeline.length-1].mins : state.wedding.eventStart;
      let candidate = lastMins + 15;
      if(candidate > state.wedding.eventEnd) candidate = state.wedding.eventEnd;
      state.timeline.push({ id: 'custom_' + Date.now(), mins: candidate, title: 'New block', sub: '' });
      sortTimeline(); render();
    });
    document.querySelectorAll('[data-jump-moment]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ state.section = 'music'; state.highlightMoment = btn.dataset.jumpMoment; render(); });
    });
    const evStart = document.getElementById('bwp-evt-start');
    const evEnd = document.getElementById('bwp-evt-end');
    if(evStart) evStart.addEventListener('change', ()=>{ const v = parseTime(evStart.value); if(v != null) state.wedding.eventStart = v; render(); });
    if(evEnd) evEnd.addEventListener('change', ()=>{ const v = parseTime(evEnd.value); if(v != null) state.wedding.eventEnd = v; render(); });
  }

  // Returns { stage, label, kind } where kind is 'done', 'upNext', or 'notStarted'
  function currentMilestoneSummary(eventId){
    const ms = state.milestones[eventId] || {};
    let lastDoneIdx = -1;
    let firstUncheckedIdx = -1;
    MILESTONE_STEPS.forEach((s, i)=>{
      if(ms[s.key] && ms[s.key].done) lastDoneIdx = i;
      else if(firstUncheckedIdx === -1) firstUncheckedIdx = i;
    });
    if(firstUncheckedIdx === -1){
      return { stage: 'completed', label: 'Event completed', kind: 'done' };
    }
    if(lastDoneIdx === -1){
      return { stage: MILESTONE_STEPS[0].key, label: MILESTONE_STEPS[0].label, kind: 'notStarted' };
    }
    return { stage: MILESTONE_STEPS[firstUncheckedIdx].key, label: MILESTONE_STEPS[firstUncheckedIdx].label, kind: 'upNext' };
  }

  function renderMilestonesBlock(eventId){
    const ms = state.milestones[eventId] || {};
    let firstUnchecked = -1;
    MILESTONE_STEPS.forEach((s, i)=>{ if(firstUnchecked === -1 && !(ms[s.key] && ms[s.key].done)) firstUnchecked = i; });
    let html = '<div class="bwp-milestones">';
    MILESTONE_STEPS.forEach((s, i)=>{
      const data = ms[s.key] || { done: false, when: '' };
      const isCurrent = i === firstUnchecked && !data.done;
      const cls = data.done ? ' done' : (isCurrent ? ' current' : '');
      const check = data.done ? '\u2713' : (isCurrent ? '\u25CF' : '');
      const time = data.when ? '<span class="bwp-milestone-time'+(isCurrent?' live':'')+'">'+escapeHtml(data.when)+'</span>' : (isCurrent ? '<span class="bwp-milestone-time live">Up next</span>' : '');
      html += '<div class="bwp-milestone'+cls+'" data-milestone="'+s.key+'" role="button" tabindex="0" aria-pressed="'+(data.done?'true':'false')+'" aria-label="'+(data.done?'Completed: ':'Mark as: ')+escapeHtml(s.label)+'"><div class="bwp-milestone-check" aria-hidden="true">'+check+'</div><div class="bwp-milestone-label">'+escapeHtml(s.label)+'</div>'+time+'</div>';
    });
    html += '</div>';
    return html;
  }

  function wireMilestones(eventId){
    document.querySelectorAll('[data-milestone]').forEach(el=>{
      const toggle = ()=>{
        const k = el.dataset.milestone;
        if(!state.milestones[eventId]) state.milestones[eventId] = {};
        const cur = state.milestones[eventId][k] || { done: false, when: '' };
        const newDone = !cur.done;
        state.milestones[eventId][k] = { done: newDone, when: newDone ? 'Just now' : '' };
        render();
      };
      el.addEventListener('click', toggle);
      el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); } });
    });
  }

  function wireAdminReminders(){
    function findReminder(audience, id){ return audience === 'couple' ? state.coupleReminders.find(r=>r.id===id) : state.djReminders.find(r=>r.id===id); }
    // Only wire scheduled-reminder cards here. Trigger cards live in the same Reminders tab but are wired separately below.
    document.querySelectorAll('.bwp-reminder-card[data-reminder-id]').forEach(card=>{
      const id = card.dataset.reminderId; const audience = card.dataset.audience;
      const r = findReminder(audience, id);
      if(!r) return;
      const enableBox = card.querySelector('[data-reminder-enable]');
      if(enableBox) enableBox.addEventListener('change', (e)=>{ r.enabled = e.target.checked; render(); });
      card.querySelector('[data-reminder-name]').addEventListener('input', (e)=>{ r.name = e.target.value; });
      card.querySelector('[data-reminder-days]').addEventListener('input', (e)=>{ r.daysOut = e.target.value === '' ? null : parseInt(e.target.value); });
      card.querySelector('[data-reminder-recurring]').addEventListener('change', (e)=>{ r.recurring = e.target.value; });
      card.querySelector('[data-reminder-message]').addEventListener('input', (e)=>{ r.message = e.target.value; });
      card.querySelectorAll('[data-channel]').forEach(b=>{ b.addEventListener('click', ()=>{
        if(b.disabled) return;
        r.channels[b.dataset.channel] = !r.channels[b.dataset.channel];
        render();
      }); });
      card.querySelectorAll('[data-anchor]').forEach(b=>{ b.addEventListener('click', ()=>{ r.anchor = b.dataset.anchor; render(); }); });
      const skipBox = card.querySelector('[data-reminder-skipcomplete]');
      if(skipBox) skipBox.addEventListener('change', (e)=>{ r.skipIfComplete = e.target.checked; render(); });
      card.querySelector('[data-reminder-remove]').addEventListener('click', ()=>{
        const list = audience === 'couple' ? state.coupleReminders : state.djReminders;
        const idx = list.findIndex(x=>x.id===id);
        if(idx>-1){ const removed = list.splice(idx, 1)[0]; showToast('Removed reminder', ()=>{ list.splice(idx, 0, removed); }); }
      });
    });
    document.querySelectorAll('[data-add-reminder]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const aud = btn.dataset.addReminder;
        const list = aud === 'couple' ? state.coupleReminders : state.djReminders;
        list.push({ id: 'r_'+Date.now(), name: 'New reminder', enabled: true, anchor: 'beforeWedding', daysOut: 7, recurring: 'once', channels: { push: true, email: true, sms: false }, message: '' });
        render();
      });
    });
    // Event-triggered notifications
    document.querySelectorAll('[data-trigger-id]').forEach(card=>{
      const id = card.dataset.triggerId;
      const t = state.eventTriggers.find(x => x.id === id);
      if(!t) return;
      const enableBox = card.querySelector('[data-trigger-enable]');
      if(enableBox) enableBox.addEventListener('change', (e)=>{ t.enabled = e.target.checked; render(); });
      card.querySelectorAll('[data-trigger-recipient]').forEach(box=>{
        box.addEventListener('change', (e)=>{ t.recipients[box.dataset.triggerRecipient] = e.target.checked; render(); });
      });
      card.querySelectorAll('[data-trigger-channel]').forEach(b=>{
        b.addEventListener('click', ()=>{
          if(b.disabled) return;
          t.channels[b.dataset.triggerChannel] = !t.channels[b.dataset.triggerChannel];
          render();
        });
      });
      const msg = card.querySelector('[data-trigger-message]');
      if(msg) msg.addEventListener('input', (e)=>{ t.message = e.target.value; });
    });
  }

      showToast('Reminder queued via '+enabled.join(', '));
      state.customSend.message = ''; render();
    });
  }

  function generateToken(){
    // 6 chars, no ambiguous (0/O, 1/I, etc.)
    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let t = '';
    for(let i=0;i<6;i++) t += chars[Math.floor(Math.random()*chars.length)];
    return t;
  }
  function tokenAge(iso){
    if(!iso) return '';
    const created = new Date(iso); const now = new Date();
    const days = Math.floor((now - created) / (1000*60*60*24));
    if(days === 0) return 'created today';
    if(days === 1) return 'created yesterday';
    if(days < 30) return 'created '+days+' days ago';
    return 'created '+Math.floor(days/30)+' month'+(Math.floor(days/30)===1?'':'s')+' ago';
  }

      '<div class="bwp-field"><label>Event type</label><select id="bwp-ne-type"><option value="wedding" '+(isCorp?'':'selected')+'>Wedding</option><option value="corporate" '+(isCorp?'selected':'')+'>Private / Corporate</option></select></div></div>'+

      '<div class="bwp-field"><label>Venue</label><select id="bwp-ne-venue"><option value="">No venue</option>'+state.venues.map(v=>'<option value="'+escapeHtml(v.id)+'" '+(n.venueId===v.id?'selected':'')+'>'+escapeHtml(v.name)+'</option>').join('')+'</select></div></div>'+

  function renderAdminEvents(){
    const counts = eventStatusCounts();
    const filter = state.adminEventsFilter || 'active';
    const events = eventsByStatus(filter);
    const tabs = [
      { key: 'active', label: 'Active', count: counts.active },
      { key: 'past', label: 'Past', count: counts.past },
      { key: 'canceled', label: 'Canceled', count: counts.canceled },
      { key: 'archived', label: 'Archived', count: counts.archived },
    ];
    let html = '<div class="bwp-admin-section"><div class="bwp-admin-section-head">Events</div><div class="bwp-admin-section-sub">Reassign DJs, link venues, manage access codes, and handle the lifecycle. Past events stay readable. Nothing auto-deletes.</div>';
    html += '<div class="bwp-admin-tabs" style="margin-bottom:14px;">';
    tabs.forEach(t=>{
      html += '<button class="bwp-admin-tab'+(filter===t.key?' active':'')+'" data-events-filter="'+t.key+'">'+t.label+' <span class="bwp-tab-count">'+t.count+'</span></button>';
    });
    html += '</div>';
    html += renderAddEventForm();
    if(!events.length){
      html += '<div class="bwp-stub"><div class="bwp-stub-icon">v</div><div class="bwp-stub-title">No '+filter+' events</div><div class="bwp-stub-sub">When events fall into this bucket, they\'ll show here.</div></div>';
      html += '</div>';
      return html;
    }
    events.forEach((ev, i)=>{
      const pct = ev.id === 'sofia-marcus' ? overallPct() : (50 + ((i*17) % 50));
      const linkedVenue = ev.venueId ? getVenueById(ev.venueId) : null;
      const since = daysSinceWedding(ev);
      const isLockedView = ev.status !== 'active'; // visually de-emphasize edits for non-active
      let banner = '';
      if(ev.status === 'past'){
        const showArchiveNudge = since >= 30;
        banner = '<div class="bwp-event-banner past"><span>Wedding was '+since+' day'+(since===1?'':'s')+' ago</span>'+(showArchiveNudge ? '<span class="bwp-event-banner-nudge">Ready to archive?</span>' : '')+'</div>';
      } else if(ev.status === 'canceled'){
        banner = '<div class="bwp-event-banner canceled"><span>Canceled</span>'+(ev.canceledReason ? '<span class="bwp-event-banner-reason">'+escapeHtml(ev.canceledReason)+'</span>' : '')+'</div>';
      } else if(ev.status === 'archived'){
        banner = '<div class="bwp-event-banner archived"><span>Archived '+(ev.archivedAt ? '\u00b7 '+formatRelativeDate(ev.archivedAt) : '')+'</span></div>';
      }
      const milestoneRow = (ev.status === 'active' || ev.status === 'past') ? renderEventMilestoneRow(ev) : '';
      html += '<div class="bwp-event-mgmt-wrap status-'+ev.status+'">'+
        banner+
        '<div class="bwp-event-mgmt">'+
          '<div class="bwp-event-mgmt-name">'+escapeHtml(ev.couple)+'<small>'+escapeHtml(linkedVenue ? linkedVenue.name : 'No venue linked')+' \u00b7 '+escapeHtml(ev.date)+' \u00b7 '+(ev.eventType==='corporate'?'Corporate':'Wedding')+'</small></div>'+
          (isLockedView
            ? '<div class="bwp-event-readonly-meta">'+escapeHtml(ev.dj)+'</div>'
            : '<select data-event-dj="'+ev.id+'" aria-label="Assigned DJ">'+ALL_DJS.map(dj=>'<option value="'+escapeHtml(dj)+'" '+(ev.dj===dj?'selected':'')+'>'+escapeHtml(dj)+'</option>').join('')+'</select>'+
              '<select data-event-venue="'+ev.id+'" class="bwp-venue-event-mgmt-select" aria-label="Linked venue"><option value="">No venue</option>'+state.venues.map(v=>'<option value="'+escapeHtml(v.id)+'" '+(ev.venueId===v.id?'selected':'')+'>'+escapeHtml(v.name)+'</option>').join('')+'</select>'+'<select data-event-type="'+ev.id+'" aria-label="Event type"><option value="wedding" '+(ev.eventType!=='corporate'?'selected':'')+'>Wedding</option><option value="corporate" '+(ev.eventType==='corporate'?'selected':'')+'>Private / Corporate</option></select>'
          )+
          '<div class="bwp-event-mgmt-pct">'+pct+'%</div>'+
        '</div>'+
        milestoneRow+
        (ev.status === 'active' ? renderEventTokenCard(ev) : '')+
        renderEventLifecycleActions(ev)+
      '</div>';
    });
    html += '</div>';
    return html;
  }
  function formatRelativeDate(iso){
    const d = new Date(iso); if(isNaN(d.getTime())) return '';
    const now = new Date(); now.setHours(0,0,0,0); d.setHours(0,0,0,0);
    const diff = Math.round((now - d) / (1000*60*60*24));
    if(diff === 0) return 'today';
    if(diff === 1) return 'yesterday';
    if(diff < 30) return diff+' days ago';
    if(diff < 365) return Math.floor(diff/30)+' months ago';
    return Math.floor(diff/365)+' year'+(Math.floor(diff/365)===1?'':'s')+' ago';
  }
  function renderEventMilestoneRow(ev){
    const summary = currentMilestoneSummary(ev.id);
    const ms = state.milestones[ev.id] || {};
    const completedCount = MILESTONE_STEPS.filter(s => ms[s.key] && ms[s.key].done).length;
    const total = MILESTONE_STEPS.length;
    let pillClass = 'bwp-milestone-pill';
    let pillLabel = '';
    if(summary.kind === 'done'){ pillClass += ' done'; pillLabel = '✓ '+summary.label; }
    else if(summary.kind === 'upNext'){ pillClass += ' upnext'; pillLabel = 'Up next: '+summary.label; }
    else { pillClass += ' notstarted'; pillLabel = 'Not started'; }
    let options = '<option value="__reset">— Reset all —</option>';
    MILESTONE_STEPS.forEach((s, i)=>{
      const done = !!(ms[s.key] && ms[s.key].done);
      options += '<option value="'+escapeHtml(s.key)+'">'+(done?'✓ ':'')+escapeHtml(s.label)+(i === MILESTONE_STEPS.length-1 ? '' : '')+'</option>';
    });
    options += '<option value="__complete">✓ Mark all complete</option>';
    return '<div class="bwp-event-milestone-row">'+
      '<div class="'+pillClass+'">'+escapeHtml(pillLabel)+'</div>'+
      '<div class="bwp-milestone-progress">'+completedCount+' / '+total+' stages</div>'+
      '<select data-event-milestone="'+ev.id+'" aria-label="Set milestone for '+escapeHtml(ev.couple)+'">'+
        '<option value="">Override stage…</option>'+
        options+
      '</select>'+
    '</div>';
  }

  function renderEventLifecycleActions(ev){
    let buttons = '';
    if(ev.status === 'active'){
      buttons += '<button class="bwp-event-action" data-event-cancel="'+ev.id+'">Mark as canceled</button>';
    } else if(ev.status === 'past'){
      buttons += '<button class="bwp-event-action" data-event-archive="'+ev.id+'">Archive</button>';
      buttons += '<button class="bwp-event-action danger" data-event-delete="'+ev.id+'">Delete permanently</button>';
    } else if(ev.status === 'canceled'){
      buttons += '<button class="bwp-event-action" data-event-restore="'+ev.id+'">Restore to active</button>';
      buttons += '<button class="bwp-event-action danger" data-event-delete="'+ev.id+'">Delete permanently</button>';
    } else if(ev.status === 'archived'){
      buttons += '<button class="bwp-event-action" data-event-restore="'+ev.id+'">Restore to active</button>';
      buttons += '<button class="bwp-event-action danger" data-event-delete="'+ev.id+'">Delete permanently</button>';
    }
    return '<div class="bwp-event-actions">'+buttons+'</div>';
  }
  function wireAdminEvents(){
    document.querySelectorAll('[data-event-dj]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        const id = sel.dataset.eventDj; const ev = state.eventAssignments.find(e=>e.id===id);
        if(ev){ ev.dj = sel.value; if(id === state.activeDjEventId) state.wedding.djName = sel.value; showToast(ev.couple+' reassigned to '+sel.value); }
      });
    });
    document.querySelectorAll('[data-event-venue]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        const id = sel.dataset.eventVenue; const ev = state.eventAssignments.find(e=>e.id===id);
        if(!ev) return;
        ev.venueId = sel.value || null;
        const v = ev.venueId ? getVenueById(ev.venueId) : null;
        if(v){
          ev.venue = v.name + (v.address ? ' \u00b7 '+v.address.split(',').pop().trim() : '');
          if(id === state.activeDjEventId){
            if(!state.vendors.venue) state.vendors.venue = { business:'', handle:'' };
            state.vendors.venue.business = v.name;
            state.general.venueName = v.name;
            state.general.venueAddress = v.address || '';
          }
          showToast(ev.couple+' linked to '+v.name);
        } else {
          ev.venue = 'No venue';
          showToast(ev.couple+' venue unlinked');
        }
        render();
      });
    });
    document.querySelectorAll('[data-token-copy]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.tokenCopy);
        if(!ev || !ev.accessToken) return;
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(ev.accessToken).then(()=>{ showToast('Copied '+ev.accessToken+' to clipboard'); });
        } else {
          showToast('Code: '+ev.accessToken);
        }
      });
    });
    document.querySelectorAll('[data-token-regen]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.tokenRegen);
        if(!ev) return;
        const oldToken = ev.accessToken;
        ev.accessToken = generateToken();
        ev.tokenCreatedAt = new Date().toISOString();
        ev.linkedDevices = 0;
        showToast('New code: '+ev.accessToken+'. Old code revoked.', ()=>{
          ev.accessToken = oldToken;
        });
        render();
      });
    });
    document.querySelectorAll('[data-token-revoke]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.tokenRevoke);
        if(!ev) return;
        const prevDevices = ev.linkedDevices || 0;
        if(prevDevices === 0){ showToast('No devices to revoke'); return; }
        ev.linkedDevices = 0;
        showToast('Revoked '+prevDevices+' device'+(prevDevices===1?'':'s')+'. They\'ll need to re-enter the code.', ()=>{
          ev.linkedDevices = prevDevices;
        });
        render();
      });
    });
    // Filter tabs
    document.querySelectorAll('[data-events-filter]').forEach(b=>{
      b.addEventListener('click', ()=>{ state.adminEventsFilter = b.dataset.eventsFilter; render(); });
    });
    // Milestone override dropdown
    document.querySelectorAll('[data-event-milestone]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        const eventId = sel.dataset.eventMilestone;
        const choice = sel.value;
        if(!choice) return;
        const ev = state.eventAssignments.find(e => e.id === eventId);
        if(!ev) return;
        const prev = JSON.parse(JSON.stringify(state.milestones[eventId] || {}));
        if(!state.milestones[eventId]) state.milestones[eventId] = {};
        const ms = state.milestones[eventId];
        if(choice === '__reset'){
          MILESTONE_STEPS.forEach(s => { ms[s.key] = { done: false, when: '' }; });
          showToast('Reset all milestones for '+ev.couple, ()=>{ state.milestones[eventId] = prev; });
        } else if(choice === '__complete'){
          const stamp = 'Just now (admin)';
          MILESTONE_STEPS.forEach(s => { ms[s.key] = { done: true, when: stamp }; });
          showToast('Marked '+ev.couple+' as fully complete', ()=>{ state.milestones[eventId] = prev; });
        } else {
          // Mark this step + everything before it as done; later steps as not done
          let hit = false;
          MILESTONE_STEPS.forEach(s => {
            if(!hit){
              ms[s.key] = { done: true, when: (prev[s.key] && prev[s.key].when) || 'Set by admin' };
              if(s.key === choice) hit = true;
            } else {
              ms[s.key] = { done: false, when: '' };
            }
          });
          const lbl = (MILESTONE_STEPS.find(s => s.key === choice) || {}).label || '';
          showToast('Set '+ev.couple+' to: '+lbl, ()=>{ state.milestones[eventId] = prev; });
        }
        render();
      });
    });
    // Cancel
    document.querySelectorAll('[data-event-cancel]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.eventCancel);
        if(!ev) return;
        const reason = window.prompt('Why is '+ev.couple+' being canceled? (Visible to your team only)', '');
        if(reason === null) return; // user hit Cancel
        const prev = { status: ev.status, canceledReason: ev.canceledReason, canceledAt: ev.canceledAt };
        ev.status = 'canceled';
        ev.canceledReason = reason || 'No reason given';
        ev.canceledAt = new Date().toISOString();
        showToast(ev.couple+' marked as canceled', ()=>{ Object.assign(ev, prev); });
        render();
      });
    });
    // Archive
    document.querySelectorAll('[data-event-archive]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.eventArchive);
        if(!ev) return;
        const prev = { status: ev.status, archivedAt: ev.archivedAt };
        ev.status = 'archived';
        ev.archivedAt = new Date().toISOString();
        showToast(ev.couple+' archived', ()=>{ Object.assign(ev, prev); });
        render();
      });
    });
    // Restore
    document.querySelectorAll('[data-event-restore]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.eventRestore);
        if(!ev) return;
        const prev = { status: ev.status, canceledReason: ev.canceledReason, canceledAt: ev.canceledAt, archivedAt: ev.archivedAt };
        ev.status = 'active';
        ev.canceledReason = '';
        ev.canceledAt = null;
        ev.archivedAt = null;
        // If wedding date is in the past, refreshEventStatuses will flip it to 'past' on next render
        showToast(ev.couple+' restored to active', ()=>{ Object.assign(ev, prev); });
        render();
      });
    });
    // Delete (typed confirmation)
    document.querySelectorAll('[data-event-delete]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const ev = state.eventAssignments.find(e => e.id === b.dataset.eventDelete);
        if(!ev) return;
        const typed = window.prompt('This permanently deletes '+ev.couple+'\'s event, planner, and all linked data. Type DELETE (all caps) to confirm.', '');
        if(typed !== 'DELETE'){
          if(typed !== null) showToast('Delete canceled. Type DELETE exactly to confirm.');
          return;
        }
        const idx = state.eventAssignments.findIndex(e => e.id === ev.id);
        if(idx === -1) return;
        const removed = state.eventAssignments.splice(idx, 1)[0];
        showToast('Permanently deleted '+removed.couple, ()=>{ state.eventAssignments.splice(idx, 0, removed); });
        render();
      });
    });
    // New-event form
    const newBtn = document.querySelector('[data-event-new]');
    if(newBtn) newBtn.addEventListener('click', ()=>{ state.adminAddingEvent = true; render(); });
    const neType = document.getElementById('bwp-ne-type');
    if(neType) neType.addEventListener('change', ()=>{ state.adminNewEvent.eventType = neType.value; render(); });
    const neCouple = document.getElementById('bwp-ne-couple');
    if(neCouple) neCouple.addEventListener('input', ()=>{ state.adminNewEvent.couple = neCouple.value; });
    const neDate = document.getElementById('bwp-ne-date');
    if(neDate) neDate.addEventListener('input', ()=>{ state.adminNewEvent.date = neDate.value; });
    const neDj = document.getElementById('bwp-ne-dj');
    if(neDj) neDj.addEventListener('change', ()=>{ state.adminNewEvent.dj = neDj.value; });
    const neVenue = document.getElementById('bwp-ne-venue');
    if(neVenue) neVenue.addEventListener('change', ()=>{ state.adminNewEvent.venueId = neVenue.value; });
    const neCancel = document.getElementById('bwp-ne-cancel');
    if(neCancel) neCancel.addEventListener('click', ()=>{ state.adminAddingEvent = false; render(); });
    const neCreate = document.getElementById('bwp-ne-create');
    if(neCreate) neCreate.addEventListener('click', ()=>{
      const n = state.adminNewEvent;
      if(!n.couple.trim()){ showToast('Add a name for the event'); return; }
      const id = 'ev_'+Date.now();
      const venue = n.venueId ? getVenueById(n.venueId) : null;
      const token = generateToken();
      state.eventAssignments.push({
        id: id, orgId: CURRENT_ORG_ID, eventType: n.eventType, couple: n.couple.trim(),
        venue: venue ? venue.name : 'TBD', venueId: n.venueId || null, date: n.date.trim() || 'TBD',
        weddingDateISO: new Date(Date.now() + 90*24*60*60*1000).toISOString(),
        dj: n.dj, accessToken: token, tokenCreatedAt: new Date().toISOString(),
        linkedDevices: 0, hasSeenWelcome: false, status: 'active',
        canceledReason: '', canceledAt: null, archivedAt: null
      });
      state.milestones[id] = {};
      MILESTONE_STEPS.forEach(stp=>{ state.milestones[id][stp.key] = { done: false, when: '' }; });
      const created = n.couple.trim();
      state.adminAddingEvent = false;
      state.adminNewEvent = { couple:'', date:'', dj:'Unassigned', venueId:'', eventType:'wedding' };
      state.adminEventsFilter = 'active';
      showToast('Created '+created+' · access code '+token);
      render();
    });
    // Per-event type selector
    document.querySelectorAll('[data-event-type]').forEach(sel=>{
      sel.addEventListener('change', ()=>{
        const ev = state.eventAssignments.find(e=>e.id===sel.dataset.eventType);
        if(ev){ ev.eventType = sel.value; showToast(ev.couple+' set to '+(sel.value==='corporate'?'Private / Corporate':'Wedding')+' mode'); render(); }
      });
    });
  }

    html += '<div class="bwp-venue-section"><div class="bwp-venue-section-label">Load-out instructions</div>';
    if(editing){
      html += '<textarea data-venue-field="loadOut" data-venue-id="'+venue.id+'" placeholder="When to be out, where trash goes, key drop..." style="width:100%;min-height:70px;padding:11px 14px;border:0.5px solid rgba(43,27,61,0.15);border-radius:10px;font-family:inherit;font-size:13px;resize:vertical;background:#ffffff;color:#2B1B3D;">'+escapeHtml(venue.loadOut||'')+'</textarea>';
    } else {
      html += '<div class="bwp-venue-readonly'+((venue.loadOut||'').trim()?'':' empty')+'">'+escapeHtml(venue.loadOut||'No instructions yet.')+'</div>';
    }
    html += '</div>';

    // Internal notes
    html += '<div class="bwp-venue-section"><div class="bwp-venue-section-label">Internal notes</div>';
    if(editing){
      html += '<textarea data-venue-field="notes" data-venue-id="'+venue.id+'" placeholder="Power, sound restrictions, gotchas..." style="width:100%;min-height:90px;padding:11px 14px;border:0.5px solid rgba(43,27,61,0.15);border-radius:10px;font-family:inherit;font-size:13px;resize:vertical;background:#ffffff;color:#2B1B3D;">'+escapeHtml(venue.notes||'')+'</textarea>';
    } else {
      html += '<div class="bwp-venue-readonly'+((venue.notes||'').trim()?'':' empty')+'">'+escapeHtml(venue.notes||'No notes yet.')+'</div>';
    }
    html += '</div>';

    html += '</div>';
    return html;
  }

  function wireVenueCard(venueId){
    document.querySelectorAll('[data-venue-card="'+venueId+'"] [data-venue-field]').forEach(input=>{
      input.addEventListener('input', ()=>{
        const v = getVenueById(input.dataset.venueId);
        if(v) v[input.dataset.venueField] = input.value;
      });
    });
    document.querySelectorAll('[data-venue-card="'+venueId+'"] [data-contact-field]').forEach(input=>{
      input.addEventListener('input', ()=>{
        const row = input.closest('[data-contact-id]');
        if(!row) return;
        const v = getVenueById(row.dataset.venueId);
        if(!v) return;
        const c = (v.contacts||[]).find(x => x.id === row.dataset.contactId);
        if(c) c[input.dataset.contactField] = input.value;
      });
    });
    document.querySelectorAll('[data-venue-card="'+venueId+'"] [data-contact-remove]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const row = btn.closest('[data-contact-id]');
        if(!row) return;
        const v = getVenueById(row.dataset.venueId);
        if(!v) return;
        const idx = (v.contacts||[]).findIndex(c => c.id === row.dataset.contactId);
        if(idx === -1) return;
        const removed = v.contacts.splice(idx, 1)[0];
        showToast('Removed '+(removed.name || removed.title || 'contact'), ()=>{ v.contacts.splice(idx, 0, removed); });
      });
    });
    document.querySelectorAll('[data-add-contact="'+venueId+'"]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const v = getVenueById(venueId);
        if(!v) return;
        if(!v.contacts) v.contacts = [];
        v.contacts.push({ id: 'c_'+Date.now(), name: '', title: '', phone: '', email: '' });
        render();
      });
    });
  }

  function renderAdminVenues(){
    const activeId = state.activeVenueId;
    const active = activeId ? getVenueById(activeId) : null;
    if(active){
      const editing = isVenueEditing(active.id);
      const headerExtra = '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
        (editing ? '<button class="bwp-btn-mint" data-venue-done="'+active.id+'">Done editing</button>' : '<button class="bwp-btn-primary" data-venue-edit="'+active.id+'">Edit venue</button>')+
        '<button class="bwp-btn-ghost" data-venue-remove="'+active.id+'">Delete</button>'+
      '</div>';
      let html = '<div class="bwp-admin-section">';
      html += '<button class="bwp-back" data-venue-back style="margin-bottom:14px;"><span>\u2190</span> Back to all venues</button>';
      html += renderVenueCard(active, { editing, headerExtra });
      html += '<div style="font-size:12px;color:#6B5B7A;">Linked to '+eventCountForVenue(active.id)+' event'+(eventCountForVenue(active.id)===1?'':'s')+'. Edits are visible to assigned DJs in real time.</div>';
      html += '</div>';
      return html;
    }
    let html = '<div class="bwp-admin-section"><div class="bwp-admin-section-head">Venues</div><div class="bwp-admin-section-sub">Master list. Internal notes the couple never sees. DJs see this card on every event linked to the venue.</div>';
    html += '<div class="bwp-venue-grid">';
    state.venues.forEach(v=>{
      const contactCount = (v.contacts||[]).length;
      const eventCount = eventCountForVenue(v.id);
      const filled = ['loadIn','loadOut','notes'].filter(k => (v[k]||'').trim()).length;
      html += '<div class="bwp-venue-card" data-venue-open="'+v.id+'" role="button" tabindex="0" aria-label="Open '+escapeHtml(v.name)+'"><div class="bwp-venue-card-name">'+escapeHtml(v.name||'Untitled')+'</div><div class="bwp-venue-card-addr">'+escapeHtml(v.address||'No address')+'</div><div class="bwp-venue-card-meta">'+
        '<span class="bwp-venue-stat'+(contactCount?'':' bwp-venue-stat-empty')+'">'+contactCount+' contact'+(contactCount===1?'':'s')+'</span>'+
        '<span class="bwp-venue-stat'+(filled?'':' bwp-venue-stat-empty')+'">'+filled+'/3 details</span>'+
        (eventCount ? '<span class="bwp-venue-card-events">'+eventCount+' event'+(eventCount===1?'':'s')+'</span>' : '')+
      '</div></div>';
    });
    html += '</div>';
    html += '<button class="bwp-btn-primary" data-venue-add style="margin-top:14px;">+ Add new venue</button>';
    html += '</div>';
    return html;
  }

  function wireAdminVenues(){
    document.querySelectorAll('[data-venue-open]').forEach(el=>{
      const open = ()=>{ state.activeVenueId = el.dataset.venueOpen; render(); };
      el.addEventListener('click', open);
      el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); open(); } });
    });
    const addBtn = document.querySelector('[data-venue-add]');
    if(addBtn) addBtn.addEventListener('click', ()=>{
      const id = 'v_'+Date.now();
      state.venues.push({ id, name: 'New venue', address: '', contacts: [], loadIn: '', loadOut: '', notes: '' });
      state.activeVenueId = id;
      setVenueEditing(id, true);
      render();
    });
    const back = document.querySelector('[data-venue-back]');
    if(back) back.addEventListener('click', ()=>{ state.activeVenueId = null; render(); });
    document.querySelectorAll('[data-venue-edit]').forEach(b=>{
      b.addEventListener('click', ()=>{ setVenueEditing(b.dataset.venueEdit, true); render(); });
    });
    document.querySelectorAll('[data-venue-done]').forEach(b=>{
      b.addEventListener('click', ()=>{ setVenueEditing(b.dataset.venueDone, false); render(); });
    });
    document.querySelectorAll('[data-venue-remove]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const id = b.dataset.venueRemove;
        const idx = state.venues.findIndex(v => v.id === id);
        if(idx === -1) return;
        const linked = eventCountForVenue(id);
        if(linked > 0){
          showToast('Cannot delete: linked to '+linked+' event'+(linked===1?'':'s'));
          return;
        }
        const removed = state.venues.splice(idx, 1)[0];
        state.activeVenueId = null;
        showToast('Removed '+(removed.name || 'venue'), ()=>{ state.venues.splice(idx, 0, removed); });
      });
    });
    if(state.activeVenueId) wireVenueCard(state.activeVenueId);
  }

  function renderAdminComments(){
    let html = '<div class="bwp-admin-section"><div class="bwp-admin-section-head">DJ comments</div><div class="bwp-admin-section-sub">Pre-event requests, urgent flags, and post-event recaps from your DJ team.</div>';
    html += renderDjCommentsBlock(null, 'admin');
    html += '</div>';
    return html;
  }

  function renderAdminCompany(){
    const c = state.company;
    return '<div class="bwp-admin-section"><div class="bwp-admin-section-head">Company settings</div><div class="bwp-admin-section-sub">White-label this app for any DJ company.</div>'+
      '<div class="bwp-field"><label>Company name</label><input type="text" id="bwp-co-name" value="'+escapeHtml(c.name)+'" /></div>'+
      '<div class="bwp-field"><label>Contact email</label><input type="text" id="bwp-co-email" value="'+escapeHtml(c.contactEmail)+'" /></div>'+
      '<div class="bwp-field"><label>Brand accent color</label><input type="text" id="bwp-co-color" value="'+escapeHtml(c.brandColor)+'" placeholder="#F26A5A" /></div>'+
      '<div class="bwp-field"><label>Default email signature</label><textarea id="bwp-co-sig">'+escapeHtml(c.emailSignature)+'</textarea></div>'+
      '<div class="bwp-field"><label>Logo</label><div class="bwp-upload" id="bwp-co-logo" role="button" tabindex="0"><div class="bwp-upload-icon" aria-hidden="true">\u229e</div><div class="bwp-upload-title">Upload logo</div><div class="bwp-upload-sub">PNG or SVG \u00b7 transparent background</div></div><div style="font-size:11px;color:#6B5B7A;margin-top:6px;">Current: '+escapeHtml(c.logo)+'</div></div>'+
    '</div>'+
    renderEmailSender();
  }

  function renderEmailSender(){
    const e = state.emailSender || {};
    let html = '<div class="bwp-admin-section"><div class="bwp-admin-section-head">Email sender</div><div class="bwp-admin-section-sub">Pick how reminders are sent. Couples will see emails from the address you connect.</div>';
    if(e.connected){
      const provider = e.provider === 'google' ? 'Gmail / Google Workspace' : (e.provider === 'domain' ? 'Custom domain (SMTP)' : 'Connected');
      const verifiedBadge = e.verified ? '<span class="bwp-email-status connected">Verified</span>' : '<span class="bwp-email-status pending">Pending DNS verification</span>';
      html += '<div class="bwp-email-card connected">'+
        '<div class="bwp-email-card-head"><div class="bwp-email-icon">\u2709</div><div><div class="bwp-email-card-name">'+escapeHtml(e.address || 'No address')+'</div><div class="bwp-email-card-meta">'+escapeHtml(provider)+(e.domain ? ' \u00b7 '+escapeHtml(e.domain) : '')+'</div></div>'+verifiedBadge+'</div>'+
        '<div class="bwp-email-actions">'+
          '<button class="bwp-btn-ghost" id="bwp-email-test">Send test email</button>'+
          '<button class="bwp-btn-ghost" id="bwp-email-disconnect">Disconnect</button>'+
        '</div>'+
      '</div>';
    } else {
      html += '<div class="bwp-email-options">'+
        '<div class="bwp-email-option" data-email-connect="google" role="button" tabindex="0">'+
          '<div class="bwp-email-option-head"><div class="bwp-email-icon">G</div><div><div class="bwp-email-option-name">Connect Gmail / Google Workspace</div><div class="bwp-email-option-desc">Easiest. Sign in with the Google account you use for business email. Works with personal Gmail or Google Workspace.</div></div></div>'+
          '<div class="bwp-email-option-meta">Recommended for most DJs</div>'+
        '</div>'+
        '<div class="bwp-email-option" data-email-connect="domain" role="button" tabindex="0">'+
          '<div class="bwp-email-option-head"><div class="bwp-email-icon">@</div><div><div class="bwp-email-option-name">Use your own domain</div><div class="bwp-email-option-desc">Send from anything@yourcompany.com. Requires adding a couple DNS records. Best deliverability and brand control.</div></div></div>'+
          '<div class="bwp-email-option-meta">For agencies with their own domain</div>'+
        '</div>'+
      '</div>';
      html += '<div class="bwp-email-fallback">No email account connected yet. Reminders will sit in the queue until you connect a sender.</div>';
    }
    html += '</div>';
    return html;
  }
  function wireAdminCompany(){
    const m = (id, key) => { const el = document.getElementById(id); if(el) el.addEventListener('input', ()=>{ state.company[key] = el.value; }); };
    m('bwp-co-name', 'name'); m('bwp-co-email', 'contactEmail'); m('bwp-co-color', 'brandColor'); m('bwp-co-sig', 'emailSignature');
    const logo = document.getElementById('bwp-co-logo');
    if(logo){
      const upload = ()=>{ state.company.logo = 'logo.svg \u00b7 12 KB'; showToast('Logo uploaded'); };
      logo.addEventListener('click', upload);
      logo.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); upload(); } });
    }
    // Email sender
    document.querySelectorAll('[data-email-connect]').forEach(el=>{
      const provider = el.dataset.emailConnect;
      const connect = ()=>{
        if(provider === 'google'){
          state.emailSender = { connected: true, provider: 'google', address: state.company.contactEmail || 'hello@thegoataudio.com', domain: null, verified: true, connectedAt: new Date().toISOString() };
          showToast('Gmail connected. Reminders will send from '+state.emailSender.address);
        } else {
          const domain = (state.company.contactEmail || '').split('@')[1] || 'yourcompany.com';
          state.emailSender = { connected: true, provider: 'domain', address: 'noreply@'+domain, domain, verified: false, connectedAt: new Date().toISOString() };
          showToast('Domain added. Verify DNS records to start sending.');
        }
        render();
      };
      el.addEventListener('click', connect);
      el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); connect(); } });
    });
    const disc = document.getElementById('bwp-email-disconnect');
    if(disc) disc.addEventListener('click', ()=>{
      const prev = state.emailSender;
      state.emailSender = { connected: false, provider: null, address: null, domain: null, verified: false, connectedAt: null };
      showToast('Email sender disconnected', ()=>{ state.emailSender = prev; });
    });
    const test = document.getElementById('bwp-email-test');
    if(test) test.addEventListener('click', ()=>{
      if(!state.emailSender.verified){ showToast('Verify DNS first to send test'); return; }
      showToast('Test email sent to '+state.emailSender.address);
    });
  }

  document.querySelectorAll('.bwp-role-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.bwp-role-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      state.role = btn.dataset.role;
      state.view = 'dashboard';
      render();
    });
  });

  loadState();
  if(root){ root.addEventListener('input', scheduleSave); root.addEventListener('change', scheduleSave); }
  render();
})();
</script>
</body>
</html>
